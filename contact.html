<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — BENITIEN Portfolio</title>
  <meta name="description" content="Contact BENITIEN for design projects.">
  <link rel="stylesheet" href="port.css">
</head>
<body>
  <div class="page-shell">
    <aside class="side-panel">
      <span>PORTFOLIO</span>
    </aside>

    <div class="hero-shell">
      <header class="hero-header">
        <div class="brand">
          <div class="brand-icon"></div>
          <span>Benn's portfolio</span>
        </div>
        <nav class="hero-nav">
          <a href="home.html">Home</a>
          <a href="about.html">About</a>
          <a href="skills.html">Skills</a>
          <a href="contact.html">Contact</a>
        </nav>
        <a class="hero-cta" href="contact.html">Contact</a>
      </header>

      <section class="content-sections">
        <div class="section-panel">
          <h2>Contact</h2>
          <p>Get in touch to discuss your next design project, launch your site, or refresh your brand.</p>
        </div>
        <div class="section-panel">
          <form id="contactForm" style="display:grid; gap:18px;">
            <label style="display:grid; gap:10px;">
              <span>Name</span>
              <input type="text" placeholder="Your name" required style="background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:14px; color:white;">
            </label>
            <label style="display:grid; gap:10px;">
              <span>Email</span>
              <input type="email" placeholder="Your email" required style="background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:14px; color:white;">
            </label>
            <label style="display:grid; gap:10px;">
              <span>Message</span>
              <textarea rows="6" placeholder="Your message" required style="background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:14px; color:white;"></textarea>
            </label>
            <button class="btn btn-primary" type="submit">Send Message</button>
          </form>
        </div>
      </section>
    </div>
  </div>

  <footer class="page-footer">
    <p>© 2026 BENITIEN. All rights reserved.</p>
  </footer>

  <script src="port.js"></script>
</body>
</html>
